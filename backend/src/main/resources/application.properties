spring.application.name=smart-crime-backend
server.port=${PORT:8080}

# MongoDB Configuration
# Spring will automatically pick up SPRING_DATA_MONGODB_URI from environment variables.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smart_crime_db}

# JWT Secret Key
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# File Upload Max Size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
